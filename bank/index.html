<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GAS EMS — interactive theme preview (Bank)</title>
<style>
  :root{
    --bg:#f6f6f3; --card:#fff; --ink:#0b1f33; --muted:#5c6b7a; --line:#e3e5e0;
    --blue:#a8853b; --blue-bg:#f3ecd9; --green:#166b45; --green-bg:#e9f4ee;
    --gold:#a8853b; --navy:#071523; --red:#a53125; --radius:13px;
    --shadow:0 2px 10px rgba(11,31,51,.06), 0 10px 30px rgba(11,31,51,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;line-height:1.5;display:flex;min-height:100vh}
  a{color:inherit;text-decoration:none}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace}
  .num{text-align:right;font-variant-numeric:tabular-nums}

  /* sidebar */
  .side{width:216px;flex:none;background:var(--navy);color:#c2d0e0;display:flex;flex-direction:column;transition:width .18s}
  .side.collapsed{width:62px}
  .side.collapsed .lbl,.side.collapsed .navh,.side.collapsed .sname{display:none}
  .slogo{display:flex;align-items:center;gap:9px;padding:15px 15px 16px}
  .sbox{width:30px;height:30px;border-radius:8px;background:var(--blue);color:#fff;display:grid;place-items:center;font-size:10px;font-weight:800;flex:none;cursor:pointer}
  .sname{font-weight:800;font-size:15px;color:#fff;line-height:1.1}.sname small{display:block;font-weight:500;font-size:10px;opacity:.7}
  .navwrap{overflow-y:auto;flex:1;padding-bottom:16px}
  .navh{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#8ea3bd;padding:13px 16px 5px}
  .nav a{display:flex;align-items:center;gap:11px;padding:9px 16px;font-weight:500;color:#c2d0e0;cursor:pointer;border-left:3px solid transparent}
  .nav a:hover{background:rgba(255,255,255,.05);color:#fff}
  .nav a svg{width:18px;height:18px;flex:none;stroke:#8ea3bd}
  .nav a.on{background:var(--blue);color:#fff;border-left-color:#93b4fb}
  .nav a.on svg{stroke:#fff}
  .soon{margin-left:auto;font-size:8.5px;font-weight:700;background:#1c3a5e;color:#8ea3bd;padding:2px 6px;border-radius:5px}

  /* main */
  .main{flex:1;min-width:0;display:flex;flex-direction:column;height:100vh;overflow:hidden}
  .topbar{display:flex;align-items:center;gap:12px;padding:11px 20px;background:#fff;border-bottom:1px solid var(--line);flex:none}
  .search{flex:1;max-width:560px;display:flex;align-items:center;gap:9px;padding:9px 13px;background:var(--bg);border:1px solid var(--line);border-radius:10px}
  .search input{border:0;background:none;outline:none;font-size:13px;width:100%;color:var(--ink)}
  .tbi{width:32px;height:32px;border-radius:9px;background:var(--bg);color:var(--muted);display:grid;place-items:center;cursor:pointer;border:1px solid var(--line)}
  .tbi:hover{color:var(--blue);border-color:var(--blue)}
  .av{width:32px;height:32px;border-radius:50%;background:var(--blue);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:800}
  .scroll{overflow-y:auto;flex:1;padding:22px 24px 40px}

  h1{font-size:22px;font-weight:800;color:var(--navy);margin:0 0 2px}
  .sub{color:var(--muted);font-size:13px;margin:0 0 18px}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
  .kl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:8px}
  .kv{font-size:27px;font-weight:800;color:var(--navy);line-height:1}
  .kv.blue{color:var(--blue)} .kv.red{color:var(--red)}
  @media(max-width:820px){.kpis{grid-template-columns:1fr 1fr}}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px}
  .cardhead{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line)}
  .cardhead h2{font-size:15px;font-weight:700;margin:0;color:var(--navy)}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;padding:12px 18px;border-bottom:1px solid var(--line);align-items:center}
  .btn{font-size:12.5px;font-weight:600;padding:9px 14px;border-radius:9px;border:1px solid var(--line);background:#fff;color:var(--navy);cursor:pointer}
  .btn:hover{border-color:var(--blue);color:var(--blue)}
  .btn.pri{background:var(--blue);border-color:var(--blue);color:#fff}.btn.pri:hover{background:#1d4fd0;color:#fff}
  table{width:100%;border-collapse:collapse}
  th{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;text-align:left;padding:11px 14px;color:var(--muted);font-weight:700;border-bottom:1px solid var(--line);background:#f8fafd;position:sticky;top:0}
  td{padding:12px 14px;font-size:12.5px;border-bottom:1px solid #eef2f7}
  tbody tr{cursor:pointer}
  tbody tr:hover{background:var(--blue-bg)}
  .sku{color:var(--blue);font-weight:600}
  .pill{font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:100px;display:inline-block}
  .pill.ok{background:var(--green-bg);color:var(--green)}
  .pill.warn{background:#fdf1dd;color:var(--gold)}
  .pill.bad{background:#fdeaea;color:var(--red)}
  .age-g{color:var(--green);font-weight:700}.age-b{color:#b45309;font-weight:700}.age-r{color:var(--red);font-weight:700}
  .flag{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--line);font-size:13.5px}
  .flag:last-child{border-bottom:0}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:9px}
  .review{font-size:11.5px;font-weight:700;padding:5px 12px;border-radius:8px;background:#fdeaea;color:var(--red);cursor:pointer;border:1px solid #f6cfcc}
  .bar{height:7px;border-radius:4px;background:#eef2f7;overflow:hidden;margin-top:5px}
  .bar i{display:block;height:100%;background:var(--blue)}
  .chanrow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;font-size:13px}
  .chanrow b{color:var(--navy)}
  .grid2{display:grid;grid-template-columns:1.5fr 1fr;gap:16px}
  @media(max-width:900px){.grid2{grid-template-columns:1fr}}
  .hide{display:none}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;opacity:0;transition:.25s;pointer-events:none;z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .note{font-size:12px;color:var(--muted);padding:0 24px 24px}
</style>
<style>
  /* Bank theme refinements — premium serif display + navy/bronze, mono kept for data */
  h1,.kv,.cardhead h2{font-family:"Iowan Old Style","New York",Georgia,"Times New Roman",serif;letter-spacing:0}
  .sname{font-family:"Iowan Old Style","New York",Georgia,serif}
  .sbox{background:#a8853b;color:#071523}
  .nav a.on{background:#a8853b;color:#071523;font-weight:700;border-left-color:#e3c78a}
  .nav a.on svg{stroke:#071523}
  .btn.pri{background:#0b1f33;border-color:#0b1f33}
  .btn.pri:hover{background:#071523}
  .kv.blue{color:#166b45}
  .av{background:#a8853b;color:#071523}
  th{background:#faf8f4}
  tbody tr:hover{background:#f3ecd9}
</style>
</head>

    </div>
    <div class="card"><div style="overflow-x:auto"><table id="tbl"><thead><tr><th>SKU</th><th>Product</th><th class="num">COG</th><th class="num">Price</th><th class="num">Avail</th><th>Status</th></tr></thead>
      <tbody>${CATALOG.map(p=>`<tr onclick="toast('Open ${p.sku} + movement history')"><td class="mono sku">${p.sku}</td><td>${p.name}</td><td class="num">${money(p.cog)}</td><td class="num">${money(p.price)}</td><td class="num">${p.avail}</td><td><span class="pill ${p.st}">${p.st==='ok'?'In stock':(p.st==='warn'?'Low':'Out')}</span></td></tr>`).join('')}</tbody></table></div></div>`; },

  inventory(){ return `
    <h1>Inventory <span style="color:var(--muted);font-weight:500;font-size:15px">· GAS WMS</span></h1><p class="sub">Hollywood FL + Fremont CA · live</p>
    <div class="kpis">
      <div class="kpi"><div class="kl">SKUs</div><div class="kv">1,071</div></div>
      <div class="kpi"><div class="kl">Units on hand</div><div class="kv blue">4.47M</div></div>
      <div class="kpi"><div class="kl">Out of stock</div><div class="kv red">2,295</div></div>
      <div class="kpi"><div class="kl">Low stock</div><div class="kv">0</div></div>
    </div>
    <div class="card"><div style="overflow-x:auto"><table id="tbl"><thead><tr><th>SKU</th><th>Product</th><th>Warehouse</th><th class="num">On hand</th><th class="num">Reserved</th><th class="num">Available</th><th>Status</th></tr></thead>
      <tbody>${INV.map(r=>`<tr onclick="toast('Open ${r.sku}')"><td class="mono sku">${r.sku}</td><td>${r.name}</td><td>${r.wh}</td><td class="num">${r.hand}</td><td class="num">${r.res}</td><td class="num"><b>${r.av}</b></td><td><span class="pill ok">In stock</span></td></tr>`).join('')}</tbody></table></div></div>`; },

  soon(name){ return `<h1>${name}</h1><p class="sub">This section is live in the real app.</p>
    <div class="card" style="padding:40px;text-align:center;color:var(--muted)">Interactive preview — the real ${name} page has full data + actions.</div>`; }
};

function render(v){
  const el = document.getElementById('scroll');
  if(VIEWS[v]) el.innerHTML = VIEWS[v]();
  else if(v==='orders') el.innerHTML = VIEWS.shipstation().replace('ShipStation','Orders').replace('· → GAS EMS Shipping','· all channels');
  else el.innerHTML = VIEWS.soon({alerts:'Alerts',returns:'Returns',fba:'Amazon FBA',wa:'WhatsApp',suppliers:'Suppliers',health:'Account Health'}[v]||v);
  el.scrollTop = 0;
  const q = document.getElementById('q'); if(q) q.value='';
}
function go(v, node){
  document.querySelectorAll('.nav a').forEach(a=>a.classList.remove('on'));
  if(node) node.classList.add('on');
  render(v);
}
function toggleSide(){ document.getElementById('side').classList.toggle('collapsed'); }
function filterTable(){
  const q=(document.getElementById('q').value||'').toLowerCase();
  document.querySelectorAll('#tbl tbody tr').forEach(tr=>{ tr.style.display = tr.textContent.toLowerCase().includes(q)?'':'none'; });
}
let _tt;
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),1500); }
render('dash');
</script>
</body>
</html>
